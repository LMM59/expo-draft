<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Obras</title>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    .obra {
      margin-bottom: 50px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 20px;
    }

    img {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    h1, h2 { margin-bottom: 5px; }
    .autor { font-weight: bold; }
    .info { color: #555; margin-bottom: 10px; }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .voltar {
      display: inline-block;
      margin-bottom: 20px;
      cursor: pointer;
      color: #007BFF;
    }

    .voltar:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div id="conteudo">Carregando...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    // 🔧 helper: evita quebrar UI com campos vazios
    function safe(value, fallback = '') {
      return value ? value : fallback;
    }

    // 🔧 helper: só mostra áudio se existir
    function renderAudio(audioUrl) {
      if (!audioUrl) return '';
      return `<audio controls src="${audioUrl}"></audio>`;
    }

    fetch('data.json')
      .then(res => res.json())
      .then(data => {

        const container = document.getElementById('conteudo');

        // 🎯 Página individual
        if (id) {
          const obra = data.find(o => o.id === id);

          if (!obra) {
            container.innerHTML = "Obra não encontrada";
            return;
          }

          container.innerHTML = `
            <div class="voltar" onclick="window.location.href='index.html'">← Voltar</div>

            <img src="${safe(obra.imagem)}" alt="${safe(obra.titulo)}">

            <h1>${safe(obra.titulo, 'Sem título')}</h1>

            <p class="autor">${safe(obra.autor)}</p>

            <div class="info">
              ${safe(obra.cidade)} ${obra.cidade && obra.ano ? '-' : ''} ${safe(obra.ano)}<br>
              ${safe(obra.tamanho)}<br>
              ${safe(obra.impressao)}
            </div>

            ${renderAudio(obra.audio)}

            <p>${safe(obra.descricao)}</p>
          `;

          return;
        }

        // 🎯 Catálogo
        container.innerHTML = "<h1>Catálogo</h1>";

        data.forEach(obra => {
          const div = document.createElement('div');
          div.className = 'obra';

          div.innerHTML = `
            <a href="?id=${obra.id}">
              <img src="${safe(obra.imagem)}" alt="${safe(obra.titulo)}">
            </a>

            <h2>${safe(obra.titulo, 'Sem título')}</h2>

            <div class="autor">${safe(obra.autor)}</div>

            <div class="info">
              ${safe(obra.cidade)} ${obra.cidade && obra.ano ? '-' : ''} ${safe(obra.ano)}<br>
              ${safe(obra.tamanho)}<br>
              ${safe(obra.impressao)}
            </div>

            ${renderAudio(obra.audio)}

            <p>${safe(obra.descricao)}</p>
          `;

          container.appendChild(div);
        });

      })
      .catch(err => {
        document.getElementById('conteudo').innerHTML = "Erro ao carregar dados";
        console.error(err);
      });
  </script>

</body>
</html>
