<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Obra</title>
</head>
<body>

  <div id="conteudo">Carregando...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        const obra = data.find(o => o.id === id);

        if (!obra) {
          document.getElementById('conteudo').innerHTML = "Obra não encontrada";
          return;
        }

        document.getElementById('conteudo').innerHTML = `
          <h1>${obra.titulo}</h1>
          <p><strong>${obra.autor}</strong></p>
          <p>${obra.cidade} - ${obra.ano}</p>
          <p>${obra.tamanho}</p>
          <p>${obra.impressao}</p>

          <audio controls src="${obra.audio}"></audio>

          <p>${obra.descricao}</p>
        `;
      });
  </script>

</body>
</html>
