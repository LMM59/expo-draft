<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Obras</title>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    .obra {
      margin-bottom: 50px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 20px;
    }

    img {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    h2 { margin-bottom: 5px; }
    .autor { font-weight: bold; }
    .info { color: #555; }
    audio { width: 100%; margin-top: 10px; }
  </style>
</head>
<body>

  <div id="conteudo">Carregando...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    fetch('data.json')
      .then(res => res.json())
      .then(data => {

        const container = document.getElementById('conteudo');

        // 🎯 Página individual
        if (id) {
          const obra = data.find(o => o.id === id);

          if (!obra) {
            container.innerHTML = "Obra não encontrada";
            return;
          }

          container.innerHTML = `
            <img src="${obra.imagem}" alt="${obra.titulo}">
            <h1>${obra.titulo}</h1>
            <p class="autor">${obra.autor}</p>
            <div class="info">
              ${obra.cidade} - ${obra.ano}<br>
              ${obra.tamanho}<br>
              ${obra.impressao}
            </div>

            <audio controls src="${obra.audio}"></audio>

            <p>${obra.descricao}</p>
          `;

          return;
        }

        // 🎯 Catálogo
        container.innerHTML = "<h1>Catálogo</h1>";

        data.forEach(obra => {
          const div = document.createElement('div');
          div.className = 'obra';

          div.innerHTML = `
            <img src="${obra.imagem}" alt="${obra.titulo}">
            <h2>${obra.titulo}</h2>
            <div class="autor">${obra.autor}</div>
            <div class="info">
              ${obra.cidade} - ${obra.ano}<br>
              ${obra.tamanho}<br>
              ${obra.impressao}
            </div>

            <audio controls src="${obra.audio}"></audio>

            <p>${obra.descricao}</p>
          `;

          container.appendChild(div);
        });

      });
  </script>

</body>
</html>
