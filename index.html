<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Obras</title>

  <style>
    body {
      font-family: Arial;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .obra {
      margin-bottom: 50px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 20px;
    }

    img {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
    }

    h2 { margin: 5px 0; cursor: pointer; }

    .autor {
      font-weight: bold;
      cursor: pointer;
      color: #007BFF;
    }

    .autor:hover {
      text-decoration: underline;
    }

    .info { color: #555; }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .voltar {
      cursor: pointer;
      margin-bottom: 20px;
      display: inline-block;
      color: #007BFF;
    }
  </style>
</head>
<body>

<div id="conteudo">Carregando...</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const autorFiltro = params.get('autor');

function safe(v, fallback = '') {
  return v || fallback;
}

function renderAudio(url) {
  return url ? `<audio controls src="${url}"></audio>` : '';
}

fetch('data.json')
.then(res => res.json())
.then(data => {

  const container = document.getElementById('conteudo');

  // 🎯 Página da obra
  if (id) {
    const obra = data.find(o => o.id === id);

    container.innerHTML = `
      <div class="voltar" onclick="window.location.href='index.html'">← Voltar</div>

      <img src="${safe(obra.imagem)}">

      <h1>${safe(obra.titulo)}</h1>

      <div class="autor" onclick="window.location.href='?autor=${encodeURIComponent(obra.autor)}'">
        ${safe(obra.autor)}
      </div>

      <div class="info">
        ${safe(obra.cidade)} - ${safe(obra.ano)}<br>
        ${safe(obra.tamanho)}<br>
        ${safe(obra.impressao)}
      </div>

      ${renderAudio(obra.audio)}

      <p>${safe(obra.descricao)}</p>
    `;
    return;
  }

  // 🎯 Filtro por autor
  let obrasFiltradas = data;

  if (autorFiltro) {
    obrasFiltradas = data.filter(o => o.autor === autorFiltro);
    container.innerHTML = `
      <div class="voltar" onclick="window.location.href='index.html'">← Voltar</div>
      <h1>${autorFiltro}</h1>
    `;
  } else {
    container.innerHTML = "<h1>Catálogo</h1>";
  }

  obrasFiltradas.forEach(obra => {
    const div = document.createElement('div');
    div.className = 'obra';

    div.innerHTML = `
      <img src="${safe(obra.imagem)}"
           onclick="window.location.href='?id=${obra.id}'">

      <h2 onclick="window.location.href='?id=${obra.id}'">
        ${safe(obra.titulo)}
      </h2>

      <div class="autor"
           onclick="window.location.href='?autor=${encodeURIComponent(obra.autor)}'">
        ${safe(obra.autor)}
      </div>

      <div class="info">
        ${safe(obra.cidade)} - ${safe(obra.ano)}<br>
        ${safe(obra.tamanho)}<br>
        ${safe(obra.impressao)}
      </div>

      ${renderAudio(obra.audio)}

      <p>${safe(obra.descricao)}</p>
    `;

    container.appendChild(div);
  });

});
</script>

</body>
</html>
