<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <title>Obras</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }
    .obra {
      margin-bottom: 50px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 20px;
    }
    h2 { margin-bottom: 5px; }
    .autor { font-weight: bold; }
    .info { color: #555; }
    audio { width: 100%; margin-top: 10px; }
  </style>
</head>
<body>

  <h1>Catálogo</h1>
  <div id="container"></div>

  <script>
    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('container');

        data.forEach(obra => {
          const div = document.createElement('div');
          div.className = 'obra';

          div.innerHTML = `
            <h2>${obra.titulo}</h2>
            <div class="autor">${obra.autor}</div>
            <div class="info">
              ${obra.cidade}<br>
              ${obra.ano}<br>
              ${obra.tamanho}<br>
              ${obra.impressao}
            </div>
            <audio controls src="${obra.audio}"></audio>
            <p>${obra.descricao}</p>
          `;

          container.appendChild(div);
        });
      });
  </script>

</body>
</html>
